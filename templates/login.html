{% extends 'base.html' %}
{% block title %}Login - Algérie Télécom Careers{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>

        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 24px; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
